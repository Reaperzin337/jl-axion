services:
  jlaxion:
    build:
      context: .
    container_name: jl-axion
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:-troque-esta-chave}
      DATA_DIR: /data
      ADMIN_NAME: ${ADMIN_NAME:-Admin JL AXION}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@jlaxion.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-axionadmin}
    volumes:
      - ./server-data:/data
