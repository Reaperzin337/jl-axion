<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JL AXION | Carteira</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#2ea0ff">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=20260330n">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="styles.css?v=20260331d">
</head>
<body data-page="account-wallet">
  <div data-site-shell></div>

  <main class="page">
    <section class="section account-detail-page">
      <div class="account-detail-page__intro">
        <div>
          <span class="eyebrow">Minha conta</span>
          <h1>Carteira</h1>
          <p>Veja cupons ativos, saldo promocional e campanhas disponiveis para a sua conta.</p>
        </div>
        <a class="secondary-btn" href="account.html">Voltar para Minha conta</a>
      </div>

      <div class="account-stat-strip">
        <article class="account-stat-card">
          <span>Cupons ativos</span>
          <strong data-account-wallet-coupon-count>0</strong>
        </article>
        <article class="account-stat-card">
          <span>Economia potencial</span>
          <strong data-account-wallet-savings>R$ 0,00</strong>
        </article>
        <article class="account-stat-card">
          <span>Acesso rapido</span>
          <strong data-account-wallet-access>Campanhas</strong>
        </article>
      </div>

      <section class="account-detail-page__grid">
        <article class="content-card account-panel">
          <div class="section-heading section-heading--stacked">
            <div>
              <span class="eyebrow">Cupons</span>
              <h2>Beneficios da sua conta</h2>
            </div>
          </div>
          <div data-account-wallet-page></div>
        </article>

        <aside class="content-card account-panel">
          <div class="section-heading section-heading--stacked">
            <div>
              <span class="eyebrow">Uso rapido</span>
              <h2>Atalhos de compra</h2>
            </div>
          </div>
          <div class="account-inline-link-grid">
            <a class="account-inline-link" href="promotions.html">Ver ofertas ativas</a>
            <a class="account-inline-link" href="cart.html">Ir para carrinho</a>
          </div>
        </aside>
      </section>
    </section>
  </main>

  <script src="app.js?v=20260330n"></script>
</body>
</html>
