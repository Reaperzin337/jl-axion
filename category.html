<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JL AXION | Categoria</title>
  <meta name="description" content="Categorias premium da JL AXION com curadoria de produtos para carregadores, cabos, som, escritorio, utilidades e casa inteligente.">
  <meta name="theme-color" content="#58c2ff">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="styles.css?v=20260330c">
</head>
<body data-page="category">
  <div data-site-shell></div>

  <main class="page">
    <section class="page-hero page-hero--premium section">
      <div>
        <span class="eyebrow">Categoria</span>
        <p class="breadcrumbs"><a href="index.html">Inicio</a><span>/</span><span data-category-name>Categoria</span></p>
        <h1 data-category-title>Curadoria JL AXION</h1>
        <p data-category-description>Selecao premium de produtos da categoria.</p>
      </div>

      <div class="membership-card">
        <img class="membership-card__logo" src="assets/jl-axion-mark.svg" alt="Marca JL AXION">
        <div>
          <span class="eyebrow">Selecao premium</span>
          <h2 data-category-badge>EDIT</h2>
        </div>
        <div class="membership-card__meta">
          <strong data-category-count>0 itens</strong>
          <span data-category-shipping>Entrega e curadoria premium</span>
        </div>
      </div>
    </section>

    <section class="section category-feature-grid">
      <article class="content-card" data-category-editorial></article>
      <article class="content-card content-card--accent" data-category-highlight></article>
    </section>

    <section class="section catalog-shell">
      <div class="section-heading">
        <div>
          <span class="eyebrow">Catalogo da categoria</span>
          <h2 data-category-subtitle>Produtos da colecao</h2>
        </div>

        <label class="search-shell">
          <input type="search" class="input" placeholder="Buscar nesta categoria" data-category-search-input>
        </label>
      </div>

      <div class="product-grid" data-category-products></div>
    </section>

    <section class="section">
      <div class="section-heading">
        <div>
          <span class="eyebrow">Outras colecoes</span>
          <h2>Continue explorando a JL AXION</h2>
        </div>
      </div>

      <div class="department-grid" data-category-links></div>
    </section>
  </main>

  <script src="app.js?v=20260330c"></script>
</body>
</html>
